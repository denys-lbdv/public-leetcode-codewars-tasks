name: Unit tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize]
  workflow_dispatch:
  # Schedule by cron is not working in GitHub action for now, need to run it via sending POST request with event from third party scheduler like a Jenkins
  # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#onschedule
  # https://github.com/orgs/community/discussions/147369
  schedule:
    - cron: "0 07 * * *"
    - cron: "0 08 * * *"
      timezone: "Europe/Kyiv"

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for pushing to gh-pages branch

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci

      - name: Install playwright
        run: npx playwright install --with-deps

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # NOTE: It's available for all internet users!!!
      # Publish to main branch
      - name: Deploy report
        uses: peaceiris/actions-gh-pages@v4
        if: always() # Run even if tests fail
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report/
          publish_branch: gh-pages
